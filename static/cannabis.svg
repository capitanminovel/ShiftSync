<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="#00e676">
  <!-- Center stem -->
  <line x1="50" y1="95" x2="50" y2="30" stroke="#00e676" stroke-width="2.5"/>
  <!-- Small side stems -->
  <line x1="50" y1="70" x2="30" y2="80" stroke="#00e676" stroke-width="1.5"/>
