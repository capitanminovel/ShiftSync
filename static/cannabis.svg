  <!-- Upper left leaves -->
  <ellipse cx="29" cy="28" rx="6" ry="16" fill="#00e676" transform="rotate(-35 29 28)"/>
  <ellipse cx="13" cy="42" rx="5" ry="13" fill="#00e676" transform="rotate(-60 13 42)"/>
  <!-- Upper right leaves -->
  <ellipse cx="71" cy="28" rx="6" ry="16" fill="#00e676" transform="rotate(35 71 28)"/>
  <ellipse cx="87" cy="42" rx="5" ry="13" fill="#00e676" transform="rotate(60 87 42)"/>
  <!-- Lower left leaves -->
  <ellipse cx="22" cy="52" rx="5" ry="14" fill="#00e676" transform="rotate(-70 22 52)"/>
  <!-- Lower right leaves -->
